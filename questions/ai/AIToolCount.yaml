# yaml-language-server: $schema=../question.schema.json
question:
  id: AIToolCount
  version: '2026.1'
  title: |-
    In a typical week, about how many distinct AI tools or AI-enabled products do you personally use for work?

    Count a tool if you intentionally use its AI capability. This may include chatbots, AI search or answer tools, AI coding assistants, AI features in IDEs, autonomous AI agents, internal AI assistants, local model runtimes, or AI tools built into workplace software.

    Do not count AI features you do not knowingly use. Do not count multiple models inside the same product unless you use them through separate tools or interfaces.
  type: free_text
  required: false
  lines: single
  validate:
    type: number
    min: 0
