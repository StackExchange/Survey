# yaml-language-server: $schema=../question.schema.json
question:
  id: AIAvoid
  version: '2026.1'
  title: Do you try to avoid using AI tools or agents at work or school? Select the option below that most accurately reflects your reasoning.
  type: single_select
  required: false
  options:
    - Environmental concerns
    - Concern over losing job skills or training an AI to replace you
    - Issues with privacy or security
    - Moral or ethical concerns
    - Difficulty or lack of training
    - I do not avoid using AI at work or school
