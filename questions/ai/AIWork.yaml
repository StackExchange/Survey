# yaml-language-server: $schema=../question.schema.json
question:
  id: AIWork
  version: '2026.1'
  title: Which parts of your workflow are you currently integrating into AI or using AI agents to accomplish? Will they be more or less integrated over the next year? Please select one for each scenario.
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - Currently use AI or AI agents for this
      - Expect to use AI More or AI agents more for this
      - Expect to use AI or AI agents less for this
      - Do not use AI or AI agents for this and do not plan to
      - This is not part of my workflow
  options:
    - Architecture or technical design exploration
    - Product, UX, or visual design
    - Generating code in a familiar area
    - Generating code in an unfamiliar area
    - Understanding or onboarding to a new codebase
    - Debugging, troubleshooting, or refactoring code
    - Writing or improving tests
    - Reviewing code, pull requests, or design decisions
    - Finding or fixing security issues
    - Writing documentation, comments, or knowledge base content
    - Answering straightforward technical questions
    - Answering complex or ambiguous technical questions
    - Searching, summarizing, or interpreting internal knowledge
    - Analyzing data, logs, metrics, or query results
    - Writing tickets, requirements, plans, or project updates
    - Writing emails, messages, summaries, or other communication
    - Creating or configuring development/test environments
    - Deploying, operating, or troubleshooting production systems
    - Generating visual, audio, or multimedia elements
