question:
  id: KnowledgeSource
  version: '2026.1'
  title: For each source you selected, how important is it that you can quickly check where the information came from before relying on it for work?  By “check where the information came from,” we mean being able to quickly open or review the original source, context, citation, document, message, ticket, dashboard, or person behind the information.
  type: scale
  required: false
  scale:
    multiple: false
    columns:
      - Very important
      - Important
      - Somewhat important
      - Not very important
      - Least important
  carry_forward:
    from: KnowledgeQ
    include_text_entry: true
