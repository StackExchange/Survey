# yaml-language-server: $schema=../question.schema.json
question:
  id: KnowAgentDelegate
  version: '2026.1'
  title: For each job function, which tasks have you delegated to an AI tool or agent in the last 30 days?
  type: multi_select
  required: false
  options:
    - Writing, editing, or generating code
    - Debugging or troubleshooting
    - Reviewing code, pull requests, or technical changes
    - Writing or maintaining tests
    - Writing or updating documentation
    - Making technical design or architecture decisions
    - Planning, scoping, or estimating work
    - Changing production code, systems, or infrastructure
    - Deploying or releasing software
    - Monitoring systems, logs, metrics, or alerts
    - Investigating an incident, outage, or production issue
    - Maintaining dependencies, packages, or development environments
    - Finding or fixing security, privacy, or compliance issues
    - Analyzing data, reports, or business metrics
    - Onboarding to a new project, tool, system, or codebase
    - Answering questions from teammates, customers, users, or stakeholders
    - Coordinating work across teams or functions
    - None of the above
