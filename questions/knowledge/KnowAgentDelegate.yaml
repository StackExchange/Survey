# yaml-language-server: $schema=../question.schema.json
question:
  id: KnowAgentDelegate
  version: '2026.1'
  title: For each job function, which tasks have you delegated to an AI tool or agent in the last 30 days?
  type: multi_select
  required: false
  options:
    - Debugging or troubleshooting
    - Making a technical design or architecture decision
    - Changing production code or infrastructure
    - Responding to a customer or stakeholder question
    - Investigating an incident or outage
    - Onboarding to a new project or codebase
    - Choosing between technical approaches
    - Letting an AI agent take action
