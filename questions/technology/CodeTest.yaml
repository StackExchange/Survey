# yaml-language-server: $schema=../question.schema.json
question:
  id: CodeTest
  version: '2026.1'
  title: Which tools for code testing, reliability, and maintainability have you done extensive development work in over the past year? Which do you want to work in over the next year? If you worked with the tool and want to continue to do so, please check both boxes in that row.
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - '**Worked with** in past year'
      - '**Want** to work with next year'
  options:
    - CodeRabbit
    - Greptile
    - Qodo (formerly Codium)
    - Graphite
    - Ellipsis
    - Bito
    - Sourcery
    - Canary
    - label: "Other, please specify:"
      key: other
      text_entry: true
