# yaml-language-server: $schema=../question.schema.json
question:
  id: Webframe
  version: '2025.1'
  title: Which **web frameworks and web technologies** have you done extensive development work in over the past year, and which do you want to work in over the next year? (If you both worked with the framework and want to continue to do so, please check both boxes in that row.)
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - '**Worked with** in past year'
      - '**Want** to work with next year'
  options:
    - Angular
    - AngularJS
    - ASP.NET
    - ASP.NET Core
    - Astro
    - Blazor
    - Deno
    - Django
    - Drupal
    - Express
    - FastAPI
    - Fastify
    - Flask
    - jQuery
    - Laravel
    - NestJS
    - Next.js
    - Node.js
    - Nuxt.js
    - Phoenix
    - React
    - Ruby on Rails
    - Spring Boot
    - Svelte
    - Symfony
    - Vue.js
    - WordPress
    - Axum
    - label: "Other, please specify:"
      key: other
      text_entry: true
