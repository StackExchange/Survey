# yaml-language-server: $schema=../question.schema.json
question:
  id: CommPlat
  version: '2026.1'
  title: Which community platforms have you used for technology-related content or purposes considerably or consistently in the past year? Which do you want to use over the next year? Please check all that apply.
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - '**Worked with** in past year'
      - '**Want** to work with next year'
  options:
    - Bluesky
    - Company-sponsored forums
    - Dev.to
    - Discord
    - GitHub (public projects, not private repos)
    - Hacker News
    - Hashnode
    - Kaggle
    - LinkedIn
    - Medium
    - Reddit
    - Slack (public channels, not work)
    - Stack Exchange
    - Stack Overflow
    - Substack
    - Twitch
    - X
    - YouTube
    - label: Other, please specify
      key: other
      text_entry: true
