# yaml-language-server: $schema=../question.schema.json
question:
  id: Platform
  version: '2025.1'
  title: Which **cloud platforms, containerization/orchestration tools, package managers, build tools, and infrastructure as code solutions** have you done extensive development work in over the past year, and which do you want to work in over the next year? (If you both worked with the platform and want to continue to do so, please check both boxes in that row.)
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - '**Worked with** in past year'
      - '**Want** to work with next year'
  options:
    - Amazon Web Services (AWS)
    - Ansible
    - APT
    - Bun
    - Cargo
    - Chocolatey
    - Cloudflare
    - Composer
    - Datadog
    - Digital Ocean
    - Docker
    - Firebase
    - Google Cloud
    - Gradle
    - Heroku
    - Homebrew
    - IBM Cloud
    - Kubernetes
    - Make
    - Maven (build tool)
    - Microsoft Azure
    - MSBuild
    - Netlify
    - New Relic
    - Ninja
    - npm
    - NuGet
    - Pacman
    - Pip
    - pnpm
    - Podman
    - Poetry
    - Prometheus
    - Railway
    - Splunk
    - Supabase
    - Terraform
    - Vercel
    - Vite
    - Webpack
    - Yandex Cloud
    - Yarn
