# yaml-language-server: $schema=../question.schema.json
question:
  id: SOTags
  version: '2025.1'
  title: Which rising technology of the added as **new tag or tag subject area on Stack Overflow** in the last three years **have you used** regularly in the past year, and which do you **want to work with** over the next year? Please check all that apply.
  type: scale
  required: false
  randomize: true
  scale:
    multiple: true
    columns:
      - '**Worked with** in past year'
      - '**Want** to work with next year'
  options:
    - .NET 8 or higher
    - c++23
    - Tailwind CSS 4
    - Polars
    - hostinger
    - Odoo
    - Large Language Model
    - SwiftData
    - Amazon Bedrock
    - Pydantic
    - RAG
    - Microsoft Fabric
    - Google Gemini
    - Shadcn/ui
    - Delphi 12+ Athens
    - Ollama
    - LangGraph
    - uv
    - Ultralytics
    - visionOS
    - label: "Other, please specify:"
      key: other
      text_entry: true
