# yaml-language-server: $schema=../question.schema.json
question:
  id: KnowMgmt
  version: '2026.1'
  title: Which knowledge management platforms have you used for work in the past year? Which would you like to use next year? Which have you used in your agentic workflows?
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - Used for work in past year
      - Would like to use next year
      - Used in agentic workflows
  options:
    - Atlassian Confluence
    - Bloomfire
    - BookStack
    - Coda
    - Document360
    - DokuWiki
    - Google Workspace / Google Drive / Google Docs
    - Guru
    - Helpjuice
    - KnowledgeOwl
    - Microsoft SharePoint
    - Notion
    - Nuclino
    - Outline
    - Quip
    - ServiceNow Knowledge Management
    - Slab
    - Stack Internal / Stack Overflow for Teams
    - XWiki
    - Zendesk Guide
    - label: Other, please specify
      key: other
      text_entry: true
