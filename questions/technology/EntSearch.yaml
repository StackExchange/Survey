# yaml-language-server: $schema=../question.schema.json
question:
  id: EntSearch
  version: '2026.1'
  title: Which enterprise search platforms have you used for work in the past year? Which would you like to use next year? Which have you used in your agentic workflows?
  type: scale
  required: false
  scale:
    multiple: true
    columns:
      - Used for work in past year
      - Would like to use next year
      - Used in agentic workflows
  options:
    - Algolia
    - Amazon Kendra
    - Apache Solr
    - Azure AI Search / Azure Cognitive Search
    - Coveo
    - Elastic / Elasticsearch / Elastic Enterprise Search
    - Glean
    - Google Cloud Search / Vertex AI Search
    - IBM Watson Discovery
    - Lucidworks
    - Microsoft Search
    - MongoDB Atlas Search
    - OpenSearch
    - Salesforce Einstein Search
    - SearchStax
    - ServiceNow AI Search
    - Sinequa
    - Yext
    - label: "Other, please specify:"
      key: other
      text_entry: true
