# yaml-language-server: $schema=../question.schema.json
question:
  id: WebFramework
  version: '2026.1'
  title: Which web frameworks and web technologies have you done extensive development work in over the past year? Which do you want to work in over the next year? If you worked with the framework and want to continue to do so, please check both boxes in that row.
  type: scale
  required: false
