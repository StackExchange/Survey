    - AngularJS
    - ASP.NET
    - ASP.NET Core
    - Astro
    - Blazor
    - Deno
    - Django
    - Drupal
    - Express
    - FastAPI
    - Fastify
    - Flask
    - jQuery
    - Laravel
    - NestJS
    - Next.js
    - Node.js
    - Nuxt.js
    - Phoenix
    - React
    - Ruby on Rails
    - Spring Boot
    - Svelte
    - Symfony
    - Vue.js
    - WordPress
    - Axum
    - label: Other, please specify
      key: other
      text_entry: true
