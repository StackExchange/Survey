# yaml-language-server: $schema=../question.schema.json
question:
  id: JobEase
  version: '2026.1'
  title: In the past 6 months, which factor has done the most to make your job easier to do?
  type: single_select
  required: false
  randomize: true
  options:
    - Clear priorities or requirements
    - Access to the right tools or platforms
    - Reliable systems, infrastructure, or environments
    - Helpful documentation or knowledge sharing
    - Supportive teammates, managers, or mentors
    - Enough time, staffing, or resources
    - Better processes, workflows, or coordination
    - label: Other, please specify
      key: other
      text_entry: true
    - Nothing has made my job easier in the past 6 months
    - I’m not sure
