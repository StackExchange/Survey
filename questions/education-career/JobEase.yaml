# yaml-language-server: $schema=../question.schema.json
question:
  id: JobEase
  version: '2026.1'
  title: Think about your current role and how often in the past 6 months you have felt your job was easier to do because things were working well within your work setting. When things are working well at work, what do you attribute that to? Select all that apply.
  type: multi_select
  required: false
  options:
    - Clear priorities or requirements
    - Access to the right tools or platforms
    - Reliable systems, infrastructure, or environments
    - Helpful documentation or knowledge sharing
    - Supportive teammates, managers, or mentors
    - Enough time, staffing, or resources
    - AI or AI agents
    - label: Other, please specify
      key: other
      text_entry: true
