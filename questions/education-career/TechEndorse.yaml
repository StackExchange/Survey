# yaml-language-server: $schema=../question.schema.json
question:
  id: TechEndorse
  version: '2026.1'
  title: For technology that you love to use at work, school, or on personal projects, what feature is most important to you? Conversely, what feature turns you against a tool you use for work, school, or personal projects?
  type: single_select
  required: false
  randomize: true
  options:
    - AI integration or AI Agent capabilities
    - Easy-to-use API
    - Robust and complete API
    - Customizable and manageable codebase
    - Reputation for quality
    - Connected to an open-source project
    - Good brand and public image
    - Reliability and low latency
    - Costs are manageable
    - label: Other, please specify
      key: other
      text_entry: true
