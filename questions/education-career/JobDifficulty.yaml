# yaml-language-server: $schema=../question.schema.json
question:
  id: JobDifficulty
  version: '2026.1'
  title: In the past 6 months, which factor has done the most to make your job harder to do?
  type: single_select
  required: false
  randomize: true
  options:
    - Unclear priorities or requirements
    - Lack of access to the right tools or platforms
    - Unreliable systems, infrastructure, or environments
    - Poor documentation or knowledge sharing
    - Lack of support from teammates, managers, or mentors
    - Not enough time, staffing, or resources
    - Inefficient processes, workflows, or coordination
    - Leadership activity or organizational changes
    - Nothing has made my job harder in the past 6 months
    - I’m not sure
    - label: Other, please specify
      key: other
      text_entry: true
