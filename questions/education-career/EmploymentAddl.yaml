# yaml-language-server: $schema=../question.schema.json
question:
  id: EmploymentAddl
  version: '2025.1'
  title: Which of the following **additional** activities are you currently engaged in?
  type: multi_select
  required: false
  options:
    - Attending school (full-time)
    - Attending school (part-time)
    - label: Engaged in paid work (less than 10 hours per week)
      key: hrs_under_10
    - label: Engaged in paid work (10-19 hours per week)
      key: hrs_10_19
    - label: Engaged in paid work (20-29 hours per week)
      key: hrs_20_29
    - Transitioning to retirement (gradually reducing work hours)
    - Volunteering (regularly)
    - Caring for dependents (children, elderly, etc.)
    - None of the above
