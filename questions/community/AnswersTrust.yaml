# yaml-language-server: $schema=../question.schema.json
question:
  id: AnswersTrust
  version: '2026.1'
  title: What makes you trust the information you find when you are searching for answers? Select your top 3 choices.
  type: multi_select
  required: false
  validate:
    type: selection_count
    min: 0
    max: 3
  options:
    - The information was referred to me by a human I trust directly
    - The format and content of the information is well-organized and logical
    - The format and content of the information is creative and thought-provoking
    - The information has many citations, sources themselves don't matter as much as the ability to track down the origin
    - I can see user activity associated with the human that posts the information I find
    - There are many upvotes/likes/shares/views associated with the content
    - I heard about the source of information before from another trusted source, such as a news site, a social feed or a podcast interview
