# yaml-language-server: $schema=./survey.schema.json
# Survey Flow - the order Qualtrics presents blocks to a respondent.
# Docs: https://www.qualtrics.com/support/survey-platform/survey-module/survey-flow/survey-flow-overview/
#
# Each entry under `pages:` is one of:
#   - a single question id           -> "Foo"
#   - a list of ids on the same page -> [Foo, Bar]
#   - an if/then wrapping pages      -> if: <expr>, then: [...]
#
# The if/then form is "page-level branch logic": pages inside `then` only
# render when `if` evaluates true. All visibility rules live here — there's
# no per-question `show_if` field, so survey.yaml is the single source of
# truth for what a respondent sees.
# Page-break docs: https://www.qualtrics.com/support/survey-platform/survey-module/editing-questions/page-breaks/
flow:
  - block: Qualifications
    pages:
      - [WelcomeText]
      - [Consent]
      - [Age]
  - block: Work, Identity + Skills
    pages:
      - [CodeMain]
      - [Education]
      - [Employment]
      - if:
          not:
            Employment:
              - prefer_not_to_say
        then:
          - [EmploymentAddl]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [ICorPM]
          - [WorkSetting]
      - [LearnCode]
      - if:
          LearnCode:
            - yes
        then:
          - [LearnCodeHow]
      - [LearnAI]
      - if:
          LearnAI:
            - yes_own
            - yes_work
            - yes_both
        then:
          - [LearnAIHow]
      - if:
          CodeMain:
            - primary_job
            - occasionally
            - review_maintain
            - manage_support
        then:
          - [YearsCode]
      - [WorkExp]
      - [Role]
      - [RoleFunctions]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [OrgSize]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [TechBudget]
      - if:
          TechBudget:
            - increased
            - decreased
            - stayed_the_same
        then:
          - [TechBudgetAddl]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [PurchasePower]
      - [TechEndorse]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [Industry]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [JobSat]
      - if:
          JobSat:
            - '7'
            - '8'
        then:
          - [JobSatComplacent]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [JobEase]
      - if:
          JobEase:
            - clear_priorities_or_requirements
            - access_to_the_right_tools_or_platforms
            - reliable_systems_infrastructure_or_environments
            - helpful_documentation_or_knowledge_sharing
            - supportive_teammates_managers_or_mentors
            - enough_time_staffing_or_resources
            - better_processes_workflows_or_coordination
            - other
        then:
          - [JobEaseAI]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [JobDifficulty]
      - if:
          JobDifficulty:
            - unclear_priorities_or_requirements
            - lack_of_access_to_the_right_tools_or_platforms
            - unreliable_systems_infrastructure_or_environments
            - poor_documentation_or_knowledge_sharing
            - lack_of_support_from_teammates_managers_or_mentors
            - not_enough_time_staffing_or_resources
            - inefficient_processes_workflows_or_coordination
            - other
        then:
          - [JobDifficultyAI]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [ToolCount]
      - [Gender]
      - [Country]
      - [Currency]
      - [Compensation]
  - randomize: 4
    even_presentation: true
    blocks:
      - block: Technology
        pages:
          - [TechDropDown]
          - if:
              TechDropDown:
                - programming_language
            then:
              - [Languages]
              - [CodeTest]
          - if:
              TechDropDown:
                - database
            then:
              - [Databases]
          - if:
              TechDropDown:
                - cloud_platform
            then:
              - [CloudPlat]
          - if:
              TechDropDown:
                - web_technologies
            then:
              - [WebFramework]
          - if:
              TechDropDown:
                - development_environment
            then:
              - [DevIDE]
          - if:
              TechDropDown:
                - community_platform
            then:
              - [CommPlat]
          - if:
              selected_answer:
                question: CommPlat
            then:
              - [CommPlatAddl]
          - if:
              TechDropDown:
                - llm
            then:
              - [LLM]
          - if:
              TechDropDown:
                - knowledge_management
            then:
              - [KnowMgmt]
          - if:
              TechDropDown:
                - enterprise_search
            then:
              - [EntSearch]
          - if:
              TechDropDown:
                - security_software
            then:
              - [SecOps]
          - [BuildTool]
          - if:
              BuildTool:
                - small_scripts_automations
                - team_level_internal_tools
                - cross_team_platform_tools
                - customer_facing_products
                - replacing_paid_vendors
            then:
              - [BuildToolAI]
          - [Disruption]
      - block: Community
        pages:
          - [SOAccount]
          - [SOYears]
          - [SOChange]
          - if:
              SOChange:
                - visit_less_for_simple_questions
                - visit_more_for_verification_for_example_source_attribution
                - ask_fewer_questions
                - ask_more_advanced_questions
                - contribute_less
                - contribute_more
                - visit_so_more_because_ai_generated_answers_lead_you_there
                - other
                - no_change
            then:
              - [SOChangeAddl, SOChangeAddlConsent]
          - [Answers]
          - [AnswersRecall]
          - [AnswersTrust]
          - [CommunityType]
          - [CommunityGap]
          - [CommunitySkills]
      - block: AI + AI Agents
        pages:
          - [AISelect]
          - if:
              any:
                - AISelect:
                    - ai_coding_assistants_or_coding_agents
                    - general_purpose_ai_chat_tools
                    - ai_agents_or_automated_workflows
                    - internal_ai_tools_built_by_my_company
            then:
              - [AIFreq]
          - if:
              selected_answer:
                question: AIFreq
            then:
              - [AIDaily]
          - if:
              any:
                - AISelect:
                    - ai_coding_assistants_or_coding_agents
                    - general_purpose_ai_chat_tools
                    - ai_agents_or_automated_workflows
                    - internal_ai_tools_built_by_my_company
            then:
              - [AISentiment]
              - [AIComplex]
              - [AITrust]
              - [AIWork]
              - [AIWorkNext]
              - [AIToolCount]
              - [AIToolSwitch]
              - [AIImpact]
              - [AISat]
              - [AIRetain]
          - [AIMem]
          - [AIOrch]
          - [AIObs]
          - [AICodeAgent]
          - [AINoCode]
          - [AIAutomate]
          - [AIUse]
          - if:
              AIUse:
                - ai_use_is_mostly_optional_and_left_up_to_individuals
                - some_teams_actively_encourage_ai_use_but_practices_vary_across_the_organization
                - my_organization_provides_approved_ai_tools_and_guidance_for_how_to_use_them
                - my_organization_expects_some_employees_to_use_ai_tools_for_certain_types_of_work
                - my_organization_measures_or_evaluates_ai_use_as_part_of_employee_or_team_performance
                - not_sure
            then:
              - [AIAvoid]
          - [AITry]
          - [AIAdopt]
          - [AIToken]
          - [AICost]
          - if:
              AICost:
                - yes_usage_is_metered_to_manage_costs
                - yes_i_personally_monitor_my_own_use
                - yes_i_choose_cheaper_models_when_possible
                - yes_i_choose_faster_models_even_when_they_cost_more
                - yes_my_company_team_has_switched_models_vendors_that_are_more_affordable
                - yes_i_am_more_selective_about_tasks
            then:
              - [AICostPrompt]
      - block: Knowledge - Trust - Context
        pages:
          - if:
              any:
                - Employment:
                    - employed
                    - independent
                - EmploymentAddl:
                    - hrs_under_10
                    - hrs_10_19
                    - hrs_20_29
            then:
              - [KnowledgeQ]
          - if:
              KnowledgeQ:
                - coworkers_or_teammates
                - manager_or_leadership
                - internal_documentation_i_e_design_product_or_planning_docs_wiki_or_knowledge_base
                - internal_chat_tools_such_as_slack_or_teams
                - project_management_or_ticketing_tools
                - code_repositories_or_code_comments
                - product_vendor_or_api_documentation
                - meeting_notes_or_transcripts
                - customer_support_or_sales_information
                - past_decisions_or_architecture_records
                - stack_overflow
                - official_docs
                - vendor_forum
                - none_of_these
                - not_sure
                - other
            then:
              - [KnowledgeAcc]
              - [KnowledgeTime]
              - [KnowledgeSource]
          - if:
              any:
                - Employment:
                    - employed
                    - independent
                - EmploymentAddl:
                    - hrs_under_10
                    - hrs_10_19
                    - hrs_20_29
            then:
              - [KnowledgeSourceAI]
              - [KnowAgentDelegate]
              - [KnowledgeA]
              - [TrustReason]
              - [KnowAgentTrust]
              - [ContextSelect]
              - [ContextProblems]
              - [ContextFreq]
              - [ContextWork]
  - block: Final Thoughts
    pages:
      - [SurveyLength]
      - [SurveyEase]
      - [SurveyIssues]
