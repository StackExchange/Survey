            row: llm
            column: None
            selected: false
        then:
          - [LLM]
      - if:
          matrix:
            question: TechDropDown
            row: knowledge_management
            column: None
            selected: false
        then:
          - [KnowMgmt]
      - if:
          matrix:
            question: TechDropDown
            row: enterprise_search
            column: None
            selected: false
        then:
          - [EntSearch]
      - if:
          matrix:
            question: TechDropDown
            row: security_software
            column: None
            selected: false
        then:
          - [SecOps]
      - [BuildTool]
      - [BuildToolAI]
      - [Disruption]
  - block: Community
    pages:
      - [SOAccount]
      - [SOYears]
      - [SOChange]
      - [Answers]
      - [AnswersRecall]
      - [AnswersTrust]
      - [CommunityType]
