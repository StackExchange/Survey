# yaml-language-server: $schema=./survey.schema.json
# Survey Flow - the order Qualtrics presents blocks to a respondent.
# Docs: https://www.qualtrics.com/support/survey-platform/survey-module/survey-flow/survey-flow-overview/
#
# Each entry under `pages:` is one of:
#   - a single question id           -> "Foo"
#   - a list of ids on the same page -> [Foo, Bar]
#   - an if/then wrapping pages      -> if: <expr>, then: [...]
#
# The if/then form is "page-level branch logic": pages inside `then` only
# render when `if` evaluates true. All visibility rules live here — there's
# no per-question `show_if` field, so survey.yaml is the single source of
# truth for what a respondent sees.
# Page-break docs: https://www.qualtrics.com/support/survey-platform/survey-module/editing-questions/page-breaks/
flow:
  - block: Welcome
    pages:
      - [WelcomeText]
  - block: Qualifications
    pages:
      - [Consent]
      - [Age]
  - block: Work, Identity + Skills
    pages:
      - [CodeMain]
      - [Education]
      - [Employment]
      - if:
          not:
            Employment:
              - prefer_not_to_say
        then:
          - [EmploymentAddl]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [ICorPM]
          - [WorkSetting]
      - [LearnCode]
      - if:
          LearnCode:
            - yes
        then:
          - [LearnCodeHow]
      - [LearnAI]
      - if:
          LearnAI:
            - yes_own
            - yes_work
            - yes_both
        then:
          - [LearnAIHow]
      - if:
          not:
            CodeMain:
              - do_not_create_code
        then:
          - [YearsCode]
      - [WorkExp]
      - [Role]
      - [RoleFunctions]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [OrgSize]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [TechBudget]
      - if:
          TechBudget:
            - increased
            - decreased
            - stayed_the_same
        then:
          - [TechBudgetAddl]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [PurchasePower]
      - [TechEndorse]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [Industry]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [JobSat]
      - if:
          JobSat:
            - '7'
            - '8'
        then:
          - [JobSatComplacent]
      - if:
          any:
            - Employment:
                - employed
                - independent
            - EmploymentAddl:
                - hrs_under_10
                - hrs_10_19
                - hrs_20_29
        then:
          - [JobEase]
          - [JobDifficulty]
          - [JobAI]
          - [ToolCount]
      - [Gender]
      - [Country]
      - [Currency]
      - [Compensation]
  - block: Technology
    pages:
      - [TechDropDown]
      - if:
          matrix:
            question: TechDropDown
            row: programming_language
            column: None
            selected: false
        then:
          - [Languages]
          - [CodeTest]
      - if:
          matrix:
            question: TechDropDown
            row: database
            column: None
            selected: false
        then:
          - [Databases]
      - if:
